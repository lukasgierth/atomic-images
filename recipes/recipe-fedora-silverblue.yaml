---
name: sleepy-schaf
description: Image based on ublue Silverblue

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:
  - type: dnf
    install:
      packages:
        - gnome-shell-extension-blur-my-shell
        - gnome-shell-extension-caffeine
        - gnome-shell-extension-dash-to-dock
        - libgda-sqlite # for copyous
        - seahorse
    remove:
      packages:
        - cosign # will be replaced by my version
        - gnome-classic-session
        - gnome-shell-extension-apps-menu
        - gnome-shell-extension-background-logo
        - gnome-shell-extension-launch-new-instance
        - gnome-shell-extension-places-menu
        - gnome-shell-extension-window-list
        - gnome-software
        - gnome-tour
        - gnome-tweaks
        - yelp

  - from-file: shared-desktop.yaml
  - from-file: modules/flatpaks-gnome.yaml

  - type: gschema-overrides

  - type: script
    scripts:
      - gnome-defaults.sh
      - install-gnome-shell-extension-copyous.sh

  - type: systemd
    system:
      enabled:
        - dconf-update.service

  - type: script
    snippets:
      - "gnome-extensions disable blur-my-shell@aunetx"
      - "gnome-extensions disable dash-to-dock@micxgx.gmail.com"

  - type: script
    scripts:
      - prefer-bootc-over-rpm-ostree.sh
      - disable-layering.sh

  - type: files
    files:
      - source: gnome-backgrounds
        destination: /
      - source: gnome-utils
        destination: /

  - type: os-release
    properties:
      ID: fedora
      ID_LIKE: fedora
      NAME: Sleepy Schaf 44
      PRETTY_NAME: Sleepy Schaf 44
      VARIANT: Sleepy Schaf
      VARIANT_ID: sleepy-schaf
      DEFAULT_HOSTNAME: sleepy-schaf

  - type: initramfs
  - type: signing
