---
modules:
  - type: dnf
    repos:
      files:
        - charm.repo
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
        - https://repository.mullvad.net/rpm/stable/mullvad.repo
      copr:
        - gierth/image-branding
        - gierth/tools-misc
        - jdxcode/mise
        - ublue-os/packages
      # nonfree: rpmfusion
      cleanup: true
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - htop
        - net-tools
        - ublue-os-just
        - ublue-os-update-services
        - vim
        - vim-enhanced
        - vim-minimal
    install:
      packages:
        - ImageMagick # media
        - aerc # email
        - age # encryption tool
        - alacritty # terminal
        - android-tools
        - ansible # automation
        - aria2 # download
        - arp-scan # network
        - asciinema # recorder
        - atuin # history
        - autorestic # backup
        - bat # cat-in-prettier
        - bees # btrfs-dedup
        - blisp
        - btop
        - btrbk
        - btrfs-assistant
        - btrfs-progs
        - cargo
        - chezmoi # config manager
        - cmake
        - comchan # serialport
        - copr-cli
        - ctags
        - curl
        - cyanrip # accurate disc ripper
        - ddrescue
        - dfu-programmer
        - dfu-util
        - distrobox
        - du-dust
        - duf
        - esptool
        - f3
        - fastfetch
        - fd-find
        - firewall-config
        - fish
        - fisher
        - fzf
        - gcc
        - gcc-c++
        - gdu # like ncdu
        - git
        - git-annex # manage big files
        - git-delta # diff
        - git-extras # extra commands
        - glibc-static
        - glow # charm: render markdown
        - golang
        - gzip
        - httping # ping but for http
        - hyperfine # cli benchmarking
        - iperf3
        - jq
        - libxcrypt-compat
        - luajit
