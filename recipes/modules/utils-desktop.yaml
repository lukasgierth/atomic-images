---
modules:
  - type: dnf
    repos:
      files:
        - charm.repo
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
        - https://repository.mullvad.net/rpm/stable/mullvad.repo
      copr:
        - ublue-os/packages
      # nonfree: rpmfusion
      cleanup: true
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - htop
        - net-tools
        - ublue-os-just
        - ublue-os-update-services
        - vim
        - vim-enhanced
        - vim-minimal
    install:
      packages:
        - alacritty # terminal
        - bees # btrfs-dedup
        - btrbk
        - btrfs-assistant
        - btrfs-progs
        - chezmoi
        - curl
        - distrobox
        - fastfetch
        - firewall-config
        - gcc
        - gcc-c++
        - git
        - glibc-static
        - gum # fancy scripts
        - gzip
        - libxcrypt-compat
        - mpv
        - mullvad-vpn
        - picocom
        - rsync
        - snapper # btrfs snapshot management
        - tailscale
        - tcpdump
        - ublue-os-udev-rules
        - ublue-polkit-rules
        - unzip
        - wireshark
